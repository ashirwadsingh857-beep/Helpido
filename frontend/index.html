<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helpido | Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="app-container">
        <header class="header">
            <h1>Helpido</h1>
            <p>Neighborly help for SIT Lonavala.</p>
        </header>

        <div class="auth-container"> 
            
            <div id="signup-section" class="form-group">
                <input type="text" id="reg-name" class="input-field" placeholder="Full Name">
                <input type="tel" id="reg-phone-signup" class="input-field" placeholder="Phone Number">
                <button class="btn" onclick="registerUser()">Sign Up</button>
                <p class="toggle-text" style="margin-top:15px; color:#757575;">
                    Already have an account? <span onclick="toggleAuthMode()" style="color:#FF5722; cursor:pointer; font-weight:600;">Login</span>
                </p>
            </div>

            <div id="login-section" class="form-group" style="display: none;">
                <input type="tel" id="login-phone" class="input-field" placeholder="Phone Number">
                <button class="btn" onclick="requestOTP()">Get OTP</button>
                <p class="toggle-text" style="margin-top:15px; color:#757575;">
                    New here? <span onclick="toggleAuthMode()" style="color:#FF5722; cursor:pointer; font-weight:600;">Create Account</span>
                </p>
            </div>

            <div id="otp-section" class="form-group" style="display: none;">
                <p style="margin-bottom:10px; color:#757575;">Check the notification at the bottom for your code:</p>
                <input type="number" id="otp-input" class="input-field" placeholder="Enter 4-digit code">
                <button class="btn" onclick="verifyOTP()">Verify & Login</button>
                <button class="text-btn" onclick="location.reload()" style="margin-top:10px; font-size:0.8rem;">Change Number</button>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        const API_URL = 'https://helpido.onrender.com/api';

        // 1. TOAST LOGIC
        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.className = "toast"; }, 5000);
        }

        // 2. TOGGLE UI MODES
        function toggleAuthMode() {
            const signup = document.getElementById('signup-section');
            const login = document.getElementById('login-section');
            if(signup.style.display === 'none') {
                signup.style.display = 'block';
                login.style.display = 'none';
            } else {
                signup.style.display = 'none';
                login.style.display = 'block';
            }
        }

        // 3. SIGNUP LOGIC
        async function registerUser() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone-signup').value;
            if(!name || !phone) return showToast("Please fill all fields", "error");

            const res = await fetch(`${API_URL}/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone })
            });
            const data = await res.json();
            showToast(data.message);
            if(res.ok) toggleAuthMode();
        }

        // 4. REQUEST OTP (Developer Bypass)
        async function requestOTP() {
            const phone = document.getElementById('login-phone').value;
            if(!phone) return showToast("Enter phone number", "error");

            showToast("Connecting to database...");
            const res = await fetch(`${API_URL}/login/step1`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            const data = await res.json();

            if(res.ok) {
                // THE CORE FIX: Show OTP in Toast and switch UI
                showToast(`DEVELOPER OTP: ${data.otp}`, "success");
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('otp-section').style.display = 'block';
            } else {
                showToast(data.message, "error");
            }
        }

        // 5. VERIFY OTP
        async function verifyOTP() {
            const otp = document.getElementById('otp-input').value;
            const phone = document.getElementById('login-phone').value;

            const res = await fetch(`${API_URL}/login/step2`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, otp })
            });
            const data = await res.json();

            if(res.ok) {
                localStorage.setItem('helpido_user', data.userId);
                localStorage.setItem('helpido_phone', phone);
                window.location.href = 'dashboard.html';
            } else {
                showToast("Invalid Code", "error");
            }
        }
    </script>
</body>
</html>

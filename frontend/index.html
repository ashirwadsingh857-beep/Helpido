<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helpido | Neighborly Help</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF5722">
</head>

<body>

    <main class="app-container">
        <header class="header">
            <h1>Helpido</h1>
            <p>Help your neighbors. Earn rewards.</p>
        </header>

        <section id="login-section" class="form-section">
            <h2>Welcome Back</h2>
            
            <div id="auth-box">
                <div id="login-container">
                    <div class="input-group">
                        <label for="login-phone">Mobile Number</label>
                        <input type="tel" id="login-phone" placeholder="Enter 10-digit number" pattern="[0-9]{10}"
                            required>
                    </div>
                    <button onclick="requestOTP()" class="primary-btn">Get OTP</button>
                </div>

                <div id="otp-container" style="display: none;">
                    <p>Enter the 4-digit code shown in the popup:</p>
                    <div class="input-group">
                        <label for="otp-input">OTP Code</label>
                        <input type="number" id="otp-input" placeholder="0000">
                    </div>
                    <button onclick="verifyOTP()" class="primary-btn">Verify & Login</button>
                </div>
            </div>

            <div class="toggle-container">
                <p>Want to join the neighborhood?</p>
                <button class="text-btn" onclick="toggleForms()">Sign Up Here</button>
            </div>
        </section>

        <section id="signup-section" class="form-section hidden">
            <h2>Create Account</h2>
            <form id="signup-form" onsubmit="event.preventDefault();">
                <div class="input-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" placeholder="e.g., Ashirwad" required>
                </div>

                <div class="input-group">
                    <label for="signup-address">Address / House No.</label>
                    <textarea id="signup-address" rows="2" placeholder="e.g., Lonavala, Pune" required></textarea>
                </div>

                <div class="input-group">
                    <label for="signup-mobile">Mobile Number</label>
                    <input type="tel" id="signup-mobile" placeholder="Enter 10-digit number" pattern="[0-9]{10}"
                        required>
                </div>

                <div class="input-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="your@email.com" required>
                </div>

                <button type="submit" class="primary-btn">Sign Up</button>
            </form>

            <div class="toggle-container">
                <p>Already helping?</p>
                <button class="text-btn" onclick="toggleForms()">Login</button>
            </div>
        </section>
    </main>

   <script>
        const API_URL = 'https://helpido.onrender.com/api';
        let currentPhone = ''; 

        // --- UI Polish: Toast Notifications ---
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // Toggle between Login and Signup forms
        function toggleForms() {
            document.getElementById('login-section').classList.toggle('hidden');
            document.getElementById('signup-section').classList.toggle('hidden');
            
            // Reset forms when switching
            document.getElementById('login-phone').value = '';
            document.getElementById('otp-input').value = '';
            document.getElementById('signup-form').reset();
            
            // Reset OTP section visibility
            document.getElementById('otp-container').style.display = 'none';
            document.getElementById('login-container').style.display = 'block';
        }

        // Handle Signup Submission
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const address = document.getElementById('signup-address').value;
            const phone = document.getElementById('signup-mobile').value;
            const email = document.getElementById('signup-email').value;

            try {
                const res = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, address, phone, email })
                });
                
                const data = await res.json();
                showToast(data.message);

                if (res.ok) {
                    toggleForms(); // Switch to login after successful signup
                }
            } catch (err) {
                showToast("Error connecting to server.");
            }
        });

        async function requestOTP() {
            const phone = document.getElementById('login-phone').value;
            
            // Show a "loading" toast so you know the internet is working
            showToast("Connecting to MongoDB...");

            try {
                const res = await fetch(`${API_URL}/login/step1`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });

                const data = await res.json();

                if (res.ok) {
                    // THE ALERT: This pulls from the cloud
                    alert(`Helpido OTP: ${data.otp}`);
                    
                    // UI FIX: Hide login, show OTP input, but don't hide the whole app!
                    document.getElementById('login-container').style.display = 'none';
                    document.getElementById('otp-container').style.display = 'block';
                    showToast("OTP Received! Please verify.");
                } else {
                    // Use your modern toast for errors instead of boring alerts
                    showToast(data.message || "User not found!");
                }
            } catch (err) {
                showToast("Server connection failed. Check Render logs.");
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp-input').value;
            const phone = document.getElementById('login-phone').value;
            
            try {
                const res = await fetch(`${API_URL}/login/step2`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, otp })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('helpido_user', data.userId);
                    localStorage.setItem('helpido_phone', phone);
                    window.location.href = 'dashboard.html';
                } else {
                    const data = await res.json();
                    alert(data.message || "Invalid OTP");
                }
            } catch (err) {
                alert("Error connecting to server.");
            }
        }
    </script>
    <div id="toast" class="toast"></div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Error', err));
            });
        }
    </script>
</body>

</html>

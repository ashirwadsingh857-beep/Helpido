<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helpido | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <header class="header">
            <h1>Helpido</h1>
            <p>Neighborly help for SIT Lonavala.</p>
        </header>

        <div class="auth-container"> 
            <div id="login-section" class="form-group">
                <input type="tel" id="login-phone" class="input-field" placeholder="10-digit Mobile Number" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);">
                <button type="button" class="btn" onclick="requestOTP()">Get OTP</button>
                <p class="toggle-text" style="margin-top:15px; color:#757575;">
                    New here? <span onclick="switchMode('signup')" style="color:#FF5722; cursor:pointer; font-weight:600;">Sign Up</span>
                </p>
            </div>

            <div id="signup-section" class="form-group" style="display: none;">
                <input type="text" id="reg-name" class="input-field" placeholder="Full Name">
                <input type="text" id="reg-address" class="input-field" placeholder="Address (e.g., Datta Mandir)">
                <input type="tel" id="reg-phone" class="input-field" placeholder="10-digit Mobile Number" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);">
                <button type="button" class="btn" onclick="registerUser()">Create Account</button>
                <p class="toggle-text" style="margin-top:15px; color:#757575;">
                    Already registered? <span onclick="switchMode('login')" style="color:#FF5722; cursor:pointer; font-weight:600;">Login</span>
                </p>
            </div>

            <div id="otp-section" class="form-group" style="display: none;">
                <p style="margin-bottom:10px; color:#757575; font-size:0.9rem;">Check the popup for your 4-digit code.</p>
                <input type="number" id="otp-input" class="input-field" placeholder="Enter 4-digit OTP" oninput="this.value = this.value.slice(0, 4);">
                <button type="button" class="btn" onclick="verifyOTP()">Verify & Enter</button>
                <button type="button" class="text-btn" onclick="switchMode('login')" style="margin-top:15px;">Change Number</button>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

   <script>
    const API_URL = 'https://helpido.onrender.com/api';
    let activePhone = ""; 

    function showToast(message, type = "success") {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = `toast show ${type}`;
        setTimeout(() => { toast.className = "toast"; }, 5000);
    }

    function switchMode(mode) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('signup-section').style.display = 'none';
        document.getElementById('otp-section').style.display = 'none';

        if (mode === 'login') document.getElementById('login-section').style.display = 'block';
        if (mode === 'signup') document.getElementById('signup-section').style.display = 'block';
        if (mode === 'otp') document.getElementById('otp-section').style.display = 'block';
    }

    async function registerUser() {
        try {
            const name = document.getElementById('reg-name').value.trim();
            const address = document.getElementById('reg-address').value.trim();
            const phone = document.getElementById('reg-phone').value;

            if(!name || !address || !phone) return showToast("Please fill all fields", "error");
            if(phone.length !== 10) return showToast("Please enter a valid 10-digit number", "error");

            showToast("Creating account...", "success");

            const res = await fetch(`${API_URL}/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, address, phone })
            });
            const data = await res.json();
            
            if(res.ok) {
                showToast(data.message, "success");
                document.getElementById('login-phone').value = phone; 
                document.getElementById('reg-name').value = '';
                document.getElementById('reg-address').value = '';
                document.getElementById('reg-phone').value = '';
                switchMode('login'); 
            } else {
                showToast(data.message, "error");
            }
        } catch (err) {
            showToast("Network Error: Check internet/Render", "error");
        }
    }

    async function requestOTP() {
        try {
            const phone = document.getElementById('login-phone').value;
            
            if(!phone) return showToast("Enter your mobile number", "error");
            if(phone.length !== 10) return showToast("Please enter a valid 10-digit number", "error");

            showToast("Connecting to server...", "success");
            
            const res = await fetch(`${API_URL}/login/step1`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            const data = await res.json();

            if(res.ok) {
                activePhone = phone; 
                showToast(`OTP: ${data.otp}`, "success");
                switchMode('otp'); 
            } else {
                showToast(data.message, "error");
            }
        } catch (err) {
            showToast("Network Error: Server might be asleep", "error");
        }
    }

   async function verifyOTP() {
    try {
        const otp = document.getElementById('otp-input').value;
        const phone = activePhone || document.getElementById('login-phone').value; 

        if(!otp || otp.length !== 4) return showToast("Please enter the 4-digit code", "error");

        showToast("Verifying...", "success");

        const res = await fetch(`${API_URL}/login/step2`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone.toString(), otp: otp.toString() }) 
        });
        const data = await res.json();

        if(res.ok) {
            // 1. Force the save to memory
            localStorage.setItem('helpido_user', data.userId);
            localStorage.setItem('helpido_phone', phone.toString());
            
            showToast("Login Successful! Redirecting...", "success");
            
            // 2. The Fix: Wait half a second, then securely route to the dashboard
            setTimeout(() => {
                window.location.assign('dashboard.html'); 
            }, 500);
            
        } else {
            showToast(data.message || "Invalid Code", "error");
        }
    } catch (err) {
        showToast("Network Error: Could not reach backend", "error");
    }
}

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helpido | Neighborly Help</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF5722">
</head>

<body>

    <main class="app-container">
        <header class="header">
            <h1>Helpido</h1>
            <p>Help your neighbors. Earn rewards.</p>
        </header>

        <div class="auth-container">
            <div id="login-section">
                <div class="input-group">
                    <label for="login-phone">Mobile Number</label>
                    <input type="tel" id="login-phone" placeholder="Enter 10-digit number" pattern="[0-9]{10}"
                        required>
                </div>
                <button onclick="requestOTP()" class="primary-btn">Get OTP</button>
            </div>

            <div id="otp-section" style="display: none; margin-top: 20px;">
                <div class="input-group">
                    <label for="otp-input">OTP Code</label>
                    <input type="number" id="otp-input" placeholder="0000">
                </div>
                <button onclick="verifyOTP()" class="primary-btn">Verify & Login</button>
            </div>
        </div>

            <div class="toggle-container">
                <p>Want to join the neighborhood?</p>
                <button class="text-btn" onclick="toggleForms()">Sign Up Here</button>
            </div>
        </section>

        <section id="signup-section" class="form-section hidden">
            <h2>Create Account</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="tel" id="reg-phone" placeholder="Phone Number">
            <button class="btn" onclick="registerUser()">Sign Up</button>
        </section>
    </main>

   <script>
        const API_URL = 'https://helpido.onrender.com/api';
        let currentPhone = ''; 

        // --- UI Polish: Toast Notifications ---
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast show";
            
            // Increased to 8000ms (8 seconds) so you have time to read the OTP
            setTimeout(() => { 
                toast.className = toast.className.replace("show", ""); 
            }, 8000);
        }

        // Toggle between Login and Signup forms
        function toggleForms() {
            const authContainer = document.querySelector('.auth-container');
            const signupSection = document.getElementById('signup-section');
            
            authContainer.classList.toggle('hidden');
            signupSection.classList.toggle('hidden');
            
            // Reset forms when switching
            document.getElementById('login-phone').value = '';
            document.getElementById('otp-input').value = '';
            document.getElementById('reg-name').value = '';
            document.getElementById('reg-phone').value = '';
            
            // Reset OTP section visibility
            document.getElementById('otp-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        }

        async function registerUser() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;

            const res = await fetch(`${API_URL}/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone }) // Removed email
            });

            const data = await res.json();
            showToast(data.message);
            if (res.ok) toggleForms(); // Switch to login screen
        }

        async function requestOTP() {
            const phone = document.getElementById('login-phone').value;
            const loginSection = document.getElementById('login-section');
            const otpSection = document.getElementById('otp-section');
            
            showToast("Fetching OTP from Helpido Cloud...");

            try {
                const res = await fetch(`${API_URL}/login/step1`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });

                const data = await res.json();

                if (res.ok) {
                    // SHOW OTP in the Modern Toast
                    showToast(`OTP: ${data.otp} (Valid for 5 mins)`);
                    
                    // FORCE UI REVEAL
                    loginSection.style.display = 'none'; // Hide phone input
                    otpSection.style.display = 'block';  // Show code input
                    otpSection.style.opacity = '1';      // Ensure it's not transparent
                    
                    console.log("UI Switched to OTP mode");
                } else {
                    showToast(data.message || "User not found!");
                }
            } catch (err) {
                showToast("Check Render Logs - Connection Failed");
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp-input').value;
            const phone = document.getElementById('login-phone').value;
            
            try {
                const res = await fetch(`${API_URL}/login/step2`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, otp })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('helpido_user', data.userId);
                    localStorage.setItem('helpido_phone', phone);
                    window.location.href = 'dashboard.html';
                } else {
                    const data = await res.json();
                    alert(data.message || "Invalid OTP");
                }
            } catch (err) {
                alert("Error connecting to server.");
            }
        }
    </script>
    <div id="toast" class="toast"></div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Error', err));
            });
        }
    </script>
</body>

</html>

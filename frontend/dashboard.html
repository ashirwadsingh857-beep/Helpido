<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helpido | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container dashboard-layout">
        <section id="home-view" class="feed-section">
            <header class="dash-header" style="margin-left: -24px; margin-right: -24px; margin-bottom: 20px;">
                <div class="user-greeting">
                    <h2 id="greeting-name">Hi, Neighbor 👋</h2>
                    <p id="home-address">📍 Local Area</p>
                </div>
            </header>
            <h3 class="section-title">Help Needed Nearby</h3>
            <div id="task-feed">
                <p style="text-align: center; color: #757575; margin-top: 40px;">Loading tasks...</p>
            </div>
        </section>

        <section id="tasks-view" class="feed-section hidden">
            <header class="dash-header" style="margin-left: -24px; margin-right: -24px; margin-bottom: 24px;">
                <div class="user-greeting">
                    <h2>My Activity 📋</h2>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 4px;">Track requests and tasks you accepted.</p>
                </div>
            </header>
            <h3 class="section-title">My Uploaded Requests</h3>
            <div id="my-requests-feed" style="margin-bottom: 30px;"></div>
            <h3 class="section-title">Tasks I Accepted</h3>
            <div id="my-jobs-feed" style="margin-bottom: 40px;"></div>
        </section>

        <section id="profile-view" class="feed-section hidden">
            <h3 class="section-title">My Profile</h3>
            <div class="task-card" style="text-align: center; padding: 30px 20px;">
                <div style="font-size: 3.5rem; margin-bottom: 10px;">👤</div>
                <h2 id="profile-name" style="margin-bottom: 5px; color: var(--text-dark);">Loading...</h2>
                <p id="profile-phone" style="color: var(--text-muted); margin-bottom: 20px;">...</p>
                <div style="background-color: var(--bg-light); padding: 16px; border-radius: 8px; text-align: left; margin-bottom: 24px;">
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 600;">Home Address</p>
                    <p id="profile-address" style="color: var(--text-dark); line-height: 1.4;">...</p>
                </div>
                <button class="logout-btn" onclick="logout()">Log Out</button>
            </div>
        </section>

        <button class="fab-btn" onclick="openModal()">+</button>

        <div id="create-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <h3 style="margin-bottom: 16px; color: var(--text-dark);">Ask for Help</h3>
                <input type="text" id="task-title" placeholder="What do you need? (e.g. Move furniture)" required>
                <textarea id="task-desc" rows="3" placeholder="Provide some details..." required></textarea>
                <input type="number" id="task-reward" placeholder="Reward amount (₹)" required>
                <div class="modal-actions" style="display: flex; justify-content: space-between; margin-top: 10px;">
                    <button class="text-btn" onclick="closeModal()" style="color: #757575;">Cancel</button>
                    <button class="btn" onclick="postHelpRequest()" style="width: auto; padding: 10px 20px;">Post Request</button>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="switchTab('home')">
                <span>🏠</span><p>Home</p>
            </div>
            <div class="nav-item" id="nav-tasks" onclick="switchTab('tasks')">
                <span>📋</span><p>Tasks</p>
            </div>
            <div class="nav-item" id="nav-profile" onclick="switchTab('profile')">
                <span>👤</span><p>Profile</p>
            </div>
        </nav>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        const API_URL = 'https://helpido.onrender.com/api';
        const myPhone = localStorage.getItem('helpido_phone');

        if (!myPhone || myPhone === "undefined" || myPhone === "null") {
            document.body.innerHTML = `
                <div style="text-align: center; padding: 40px 20px; font-family: sans-serif;">
                    <h2 style="color: #D32F2F; margin-bottom: 10px;">⚠️ Memory Lost</h2>
                    <p style="color: #757575; margin-bottom: 20px;">Your browser wiped the login data.</p>
                    <a href="index.html" style="background: #FF5722; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold;">Return to Login</a>
                </div>
            `;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.className = "toast"; }, 3000);
        }

        window.onload = () => {
            if(myPhone) {
                loadProfile();
                loadTasks();
            }
        };

        async function loadProfile() {
            try {
                const res = await fetch(`${API_URL}/users/${myPhone}`);
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('profile-name').innerText = user.name;
                    document.getElementById('profile-phone').innerText = "+91 " + user.phone;
                    document.getElementById('profile-address').innerText = user.address;
                    document.getElementById('greeting-name').innerText = `Hi, ${user.name.split(' ')[0]} 👋`;
                    document.getElementById('home-address').innerText = `📍 ${user.address}`;
                }
            } catch (err) { console.error("Profile load failed"); }
        }

        async function loadTasks() {
            const feed = document.getElementById('task-feed');
            try {
                const res = await fetch(`${API_URL}/tasks`);
                const allTasks = await res.json();
                const publicTasks = allTasks.filter(t => t.postedBy !== myPhone);

                if (publicTasks.length === 0) {
                    feed.innerHTML = `<p style="text-align:center; color:#757575; padding-top:40px;">No tasks available right now.</p>`;
                } else {
                    feed.innerHTML = publicTasks.map(task => `
                        <div class="task-card">
                            <div class="task-top">
                                <h4>${task.title}</h4>
                                <span class="reward-tag">₹${task.reward}</span>
                            </div>
                            <p class="task-desc">${task.description}</p>
                            <div class="task-bottom" style="justify-content: flex-end;">
                                <button class="accept-btn" onclick="acceptTask('${task._id}')" style="width: 100%;">I can do it</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                feed.innerHTML = `<p style="text-align:center; color:red;">Failed to load tasks.</p>`;
            }
        }

        async function loadMyTasks() {
            const reqFeed = document.getElementById('my-requests-feed');
            const jobsFeed = document.getElementById('my-jobs-feed');
            try {
                const res = await fetch(`${API_URL}/tasks/my-tasks?phone=${myPhone}`);
                const data = await res.json();

                // 1. My Uploaded Requests (3-Dot Menu with Delete)
                reqFeed.innerHTML = data.myRequests.length === 0 
                    ? `<p style="color:#757575; font-size: 0.9rem;">You haven't uploaded any tasks.</p>`
                    : data.myRequests.map(task => `
                        <div class="task-card" style="border-left: 4px solid #FF5722;">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <h4>${task.title} <span style="font-size:0.8rem; color:gray; font-weight:normal;">(₹${task.reward})</span></h4>
                                
                                <button class="menu-btn" onclick="toggleMenu('menu-req-${task._id}', event)">⋮</button>
                                
                                <div id="menu-req-${task._id}" class="dropdown-menu">
                                    <button class="dropdown-item danger" onclick="deleteMyTask('${task._id}')">Delete Task</button>
                                </div>
                            </div>
                            <p class="task-desc" style="margin-bottom: 8px;">Status: <strong>${task.status.toUpperCase()}</strong></p>
                        </div>
                    `).join('');

                // 2. Tasks I Accepted (3-Dot Menu with Prioritize & Drop)
                const sortedJobs = data.myJobs.sort((a, b) => (b.isPrioritized === true) - (a.isPrioritized === true));
                jobsFeed.innerHTML = sortedJobs.length === 0 
                    ? `<p style="color:#757575; font-size: 0.9rem;">You haven't accepted any tasks.</p>`
                    : sortedJobs.map(task => `
                        <div class="task-card" style="border-left: 4px solid #2E7D32; ${task.isPrioritized ? 'background-color: #FFFDE7;' : ''}">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <h4>${task.title} ${task.isPrioritized ? '<span style="color:#F57F17; font-size:0.8rem; margin-left:6px;">★ Priority</span>' : ''}</h4>
                                
                                <button class="menu-btn" onclick="toggleMenu('menu-job-${task._id}', event)">⋮</button>
                                
                                <div id="menu-job-${task._id}" class="dropdown-menu">
                                    <button class="dropdown-item" onclick="prioritizeJob('${task._id}')">${task.isPrioritized ? 'Remove Priority' : 'Mark as Priority'}</button>
                                    <button class="dropdown-item danger" onclick="removeJob('${task._id}')">Drop Task</button>
                                </div>
                            </div>
                            <p class="task-desc" style="margin-bottom: 0;">Contact: ${task.postedBy}</p>
                        </div>
                    `).join('');
            } catch (err) {
                reqFeed.innerHTML = `<p style="color:red;">Error loading tasks.</p>`;
            }
        }

        async function acceptTask(taskId) {
            const res = await fetch(`${API_URL}/tasks/accept`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ taskId, helperPhone: myPhone })
            });
            if (res.ok) { showToast("Task Accepted!"); loadTasks(); }
        }

        async function deleteMyTask(taskId) {
            await fetch(`${API_URL}/tasks/${taskId}`, { method: 'DELETE' });
            showToast("Task Deleted"); loadMyTasks();
        }

        async function removeJob(taskId) {
            await fetch(`${API_URL}/tasks/cancel`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ taskId })
            });
            showToast("Task removed"); loadMyTasks();
        }

        async function prioritizeJob(taskId) {
            await fetch(`${API_URL}/tasks/prioritize`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ taskId })
            });
            loadMyTasks();
        }

        async function postHelpRequest() {
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-desc').value;
            const reward = parseInt(document.getElementById('task-reward').value) || 0;
            if (!title || !description) return showToast("Please fill all fields!", "error");

            const res = await fetch(`${API_URL}/tasks`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description, postedBy: myPhone, reward })
            });
            if (res.ok) {
                showToast("Task posted!"); closeModal(); loadTasks();
                document.getElementById('task-title').value = "";
                document.getElementById('task-desc').value = "";
                document.getElementById('task-reward').value = "";
            }
        }

        function switchTab(tabName) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('tasks-view').classList.add('hidden');
            document.getElementById('profile-view').classList.add('hidden');
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-tasks').classList.remove('active');
            document.getElementById('nav-profile').classList.remove('active');

            document.getElementById(`${tabName}-view`).classList.remove('hidden');
            document.getElementById(`nav-${tabName}`).classList.add('active');

            if (tabName === 'home') loadTasks();
            if (tabName === 'tasks') loadMyTasks();
            if (tabName === 'profile') loadProfile();
        }

        function openModal() { document.getElementById('create-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('create-modal').classList.add('hidden'); }
        
        function logout() {
            localStorage.removeItem('helpido_phone'); 
            window.location.href = 'index.html';      
        }

        // --- NEW: Handle opening and closing the menus ---
        function toggleMenu(menuId, event) {
            event.stopPropagation(); // Stops the click from immediately hiding the menu again
            
            // Close any other open menus first so only one is open at a time
            document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
                if(menu.id !== menuId) menu.classList.remove('show');
            });
            
            // Toggle the one you clicked
            document.getElementById(menuId).classList.toggle('show');
        }

        // Close the menu automatically if the user taps anywhere else on the screen
        document.addEventListener('click', () => {
            document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
                menu.classList.remove('show');
            });
        });
    </script>
</body>
</html>

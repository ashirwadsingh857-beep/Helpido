<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helpido | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <header class="header">
            <h1>Helpido</h1>
            <p>Neighborly help for SIT Lonavala.</p>
        </header>

        <div class="auth-container"> 
            <div id="login-section" class="form-group">
                <input type="tel" id="login-phone" class="input-field" placeholder="Enter Mobile Number">
                <button class="btn" onclick="requestOTP()">Get OTP</button>
                <p class="toggle-text" style="margin-top:15px; color:#757575;">
                    New here? <span onclick="switchMode('signup')" style="color:#FF5722; cursor:pointer; font-weight:600;">Sign Up</span>
                </p>
            </div>

            <div id="signup-section" class="form-group" style="display: none;">
                <input type="text" id="reg-name" class="input-field" placeholder="Full Name">
                <input type="text" id="reg-address" class="input-field" placeholder="Address (e.g., Datta Mandir)">
                <input type="tel" id="reg-phone" class="input-field" placeholder="Mobile Number">
                <button class="btn" onclick="registerUser()">Create Account</button>
                <p class="toggle-text" style="margin-top:15px; color:#757575;">
                    Already registered? <span onclick="switchMode('login')" style="color:#FF5722; cursor:pointer; font-weight:600;">Login</span>
                </p>
            </div>

            <div id="otp-section" class="form-group" style="display: none;">
                <p style="margin-bottom:10px; color:#757575; font-size:0.9rem;">Check the popup for your 4-digit code.</p>
                <input type="number" id="otp-input" class="input-field" placeholder="Enter OTP">
                <button class="btn" onclick="verifyOTP()">Verify & Enter</button>
                <button class="text-btn" onclick="switchMode('login')" style="margin-top:15px;">Change Number</button>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
    const API_URL = 'https://helpido.onrender.com/api';
    const myPhone = localStorage.getItem('helpido_phone');

    // THE FIX: Stricter, safer bounce check
    if (!myPhone || myPhone === "undefined" || myPhone === "null") {
        console.warn("Security check failed. Memory is empty.");
        window.location.replace('index.html'); // replace() stops back-button loops
    }

    function showToast(message, type = 'success') {
    // ... rest of your code
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.className = "toast"; }, 5000);
        }

        function switchMode(mode) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('signup-section').style.display = 'none';
            document.getElementById('otp-section').style.display = 'none';

            if (mode === 'login') document.getElementById('login-section').style.display = 'block';
            if (mode === 'signup') document.getElementById('signup-section').style.display = 'block';
            if (mode === 'otp') document.getElementById('otp-section').style.display = 'block';
        }

        async function registerUser() {
            const name = document.getElementById('reg-name').value;
            const address = document.getElementById('reg-address').value;
            const phone = document.getElementById('reg-phone').value;

            if(!name || !address || !phone) return showToast("Please fill all fields", "error");

            const res = await fetch(`${API_URL}/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, address, phone })
            });
            const data = await res.json();
            
            showToast(data.message);
            if(res.ok) {
                document.getElementById('reg-name').value = '';
                document.getElementById('reg-address').value = '';
                document.getElementById('reg-phone').value = '';
                switchMode('login'); 
            }
        }

        async function requestOTP() {
            const phone = document.getElementById('login-phone').value;
            if(!phone) return showToast("Enter your mobile number", "error");

            showToast("Connecting...");
            const res = await fetch(`${API_URL}/login/step1`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            const data = await res.json();

            if(res.ok) {
                showToast(`OTP: ${data.otp}`, "success");
                switchMode('otp'); 
            } else {
                showToast(data.message, "error");
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp-input').value;
            const phone = document.getElementById('login-phone').value;

            const res = await fetch(`${API_URL}/login/step2`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, otp })
            });
            const data = await res.json();

            if(res.ok) {
                localStorage.setItem('helpido_user', data.userId);
                localStorage.setItem('helpido_phone', phone);
                window.location.href = 'dashboard.html';
            } else {
                showToast("Invalid Code", "error");
            }
        }
    </script>
</body>
</html>

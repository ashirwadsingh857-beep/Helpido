<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="asset/192.png">

    <link rel="shortcut icon" href="asset/192.png">

    <link rel="apple-touch-icon" href="asset/192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helpido | Sign In</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- BULLETPROOF CENTERED NATIVE LAYOUT --- */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            overflow: hidden !important;
            background-color: #f8f9fa !important;
            /* Force screen background to be light gray */
            font-family: system-ui, -apple-system, sans-serif;

            /* Center everything perfectly in the middle of the screen */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            /* Destroy the giant white box from style.css */
            background: transparent !important;
            box-shadow: none !important;
            min-height: auto !important;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 380px;
            padding: 20px;
            box-sizing: border-box;

            /* Shift slightly up from absolute dead-center for optical balance */
            transform: translateY(-8%);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            width: 100%;
        }

        .header h1 {
            font-size: 3.2rem;
            margin: 0 0 5px 0;
            color: #FF5722;
            letter-spacing: -1px;
        }

        .auth-container {
            width: 100%;
            background: #fff !important;
            /* ONLY the form box should be white */
            padding: 30px 24px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1) !important;
            box-sizing: border-box;
            height: auto !important;
            /* Prevent it from stretching */
        }

        .error-text {
            color: #d32f2f;
            font-size: 0.85rem;
            margin-top: -12px;
            margin-bottom: 12px;
            text-align: left;
            font-weight: 500;
            display: none;
            /* Hidden by default */
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- PROFESSIONAL OTP INPUTS --- */
        .otp-inputs-wrapper {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .otp-box {
            width: 55px;
            height: 65px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            border: 2px solid #E0E0E0;
            border-radius: 14px;
            background: #f9f9f9;
            color: #FF5722;
            outline: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .otp-box:focus {
            border-color: #FF5722;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 87, 34, 0.15);
            transform: translateY(-2px);
        }

        .otp-box.filled {
            border-color: #FF5722;
            background: #fff;
        }

        /* Hide HTML5 Arrows */
        .otp-box::-webkit-inner-spin-button,
        .otp-box::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body>
    <main class="app-container">
        <header class="header fade-in-up">
            <div id="otp-alert-bar"
                style="display: none; background: #FFF3E0; border: 1px solid #FFE0B2; color: #E65100; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; font-weight: 500;">
                <span id="otp-alert-text"></span>
            </div>
            <h1><a href="/" style="text-decoration:none; color:inherit;">Helpido</a></h1>
            <p style="
    font-size: 1.15rem; 
    font-weight: 600; 
    background: linear-gradient(90deg, #FF5722, #FF9800); 
    -webkit-background-clip: text; 
    background-clip: text; 
    -webkit-text-fill-color: transparent; 
    margin-top: -5px; 
    margin-bottom: 0;
">
                Real-time help, exactly where you stand.
            </p>
        </header>
        <div class="auth-container fade-in-up" style="animation-delay: 0.15s;">
            <div id="login-section" class="form-group">
                <input type="tel" id="login-phone" class="input-field" placeholder="10-digit Mobile Number"
                    maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);">
                <div id="login-error" class="error-text"></div>
                <button type="button" class="btn" onclick="requestOTP()">Get OTP</button>
                <p class="toggle-text" style="margin-top:15px; color:#757575;">
                    New here? <span onclick="switchMode('signup')"
                        style="color:#FF5722; cursor:pointer; font-weight:600;">Sign Up</span>
                </p>
            </div>

            <div id="signup-section" class="form-group" style="display: none;">
                <input type="text" id="reg-name" class="input-field" placeholder="Full Name">
                <input type="text" id="reg-address" class="input-field" placeholder="Address (e.g., Datta Mandir)">
                <input type="tel" id="reg-phone" class="input-field" placeholder="10-digit Mobile Number" maxlength="10"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);">
                <input type="email" id="reg-email" class="input-field" placeholder="Email Address">
                <div id="signup-error" class="error-text"></div>
                <button type="button" class="btn" onclick="registerUser()">Create Account</button>
                <p class="toggle-text" style="margin-top:15px; color:#757575;">
                    Already registered? <span onclick="switchMode('login')"
                        style="color:#FF5722; cursor:pointer; font-weight:600;">Login</span>
                </p>
            </div>

            <div id="otp-section" class="form-group" style="display: none;">
                <p id="otp-message" style="margin-bottom:20px; color:#555; font-size:0.95rem; line-height:1.4;"></p>
                
                <div class="otp-inputs-wrapper" id="otp-inputs-container">
                    <input type="tel" class="otp-box" maxlength="1" oninput="handleOtpInput(this, 0)" onkeydown="handleOtpKeydown(this, 0)" onfocus="handleOtpFocus(this, 0)" autocomplete="one-time-code">
                    <input type="tel" class="otp-box" maxlength="1" oninput="handleOtpInput(this, 1)" onkeydown="handleOtpKeydown(this, 1)" onfocus="handleOtpFocus(this, 1)">
                    <input type="tel" class="otp-box" maxlength="1" oninput="handleOtpInput(this, 2)" onkeydown="handleOtpKeydown(this, 2)" onfocus="handleOtpFocus(this, 2)">
                    <input type="tel" class="otp-box" maxlength="1" oninput="handleOtpInput(this, 3)" onkeydown="handleOtpKeydown(this, 3)" onfocus="handleOtpFocus(this, 3)">
                </div>

                <div id="otp-error" class="error-text"></div>
                <button type="button" class="btn" onclick="verifyOTP()">Verify & Enter</button>
                <button type="button" class="text-btn" onclick="switchMode('login')" style="margin-top:15px;">Change Number</button>
            </div>
        </div>
    </main>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000/api'
            : '/api';
        let activePhone = "";

        // --- NEW: Auto-Skip Login ---
        // If the browser remembers them, instantly jump to the dashboard!
        const savedPhone = localStorage.getItem('helpido_phone');
        // If we are in Flutter, skip to auth (this file IS the auth, so just let it render)
        // but if they are already logged in in Flutter, go to dashboard.
        if (savedPhone && savedPhone !== "undefined" && savedPhone !== "null") {
            window.location.replace('/dashboard.html');
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');

            if (mode === 'signup') switchMode('signup');
        };

        function showError(id, message) {
            const errDiv = document.getElementById(id);
            if (errDiv) {
                errDiv.innerText = message;
                errDiv.style.display = 'block';
            }
        }

        function clearErrors() {
            document.querySelectorAll('.error-text').forEach(div => {
                div.innerText = '';
                div.style.display = 'none';
            });
        }

        // ... rest of your code ...

        function switchMode(mode) {
            clearErrors();
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('signup-section').style.display = 'none';
            document.getElementById('otp-section').style.display = 'none';

            // Hide the alert bar by default when switching modes
            if (mode !== 'otp') {
                document.getElementById('otp-alert-bar').style.display = 'none';
            }

            if (mode === 'login') document.getElementById('login-section').style.display = 'block';
            if (mode === 'signup') document.getElementById('signup-section').style.display = 'block';
            if (mode === 'otp') {
                document.getElementById('otp-section').style.display = 'block';
                // Automatically focus first OTP box to trigger mobile keyboard
                setTimeout(() => {
                    const firstBox = document.querySelector('.otp-box');
                    if (firstBox) firstBox.focus();
                }, 50);
            }
        }

        function handleOtpInput(input, index) {
            // Strip anything not a digit
            input.value = input.value.replace(/[^0-9]/g, '');
            
            if (input.value.length === 1) {
                input.classList.add('filled');
                // Move to next box
                const boxes = document.querySelectorAll('.otp-box');
                if (index < 3) {
                    boxes[index + 1].focus();
                } else {
                    // Last box filled — trigger auto-verify!
                    verifyOTP();
                }
            } else {
                input.classList.remove('filled');
            }
        }

        function handleOtpKeydown(input, index) {
            if (event.key === "Backspace" && input.value.length === 0) {
                const boxes = document.querySelectorAll('.otp-box');
                if (index > 0) {
                    boxes[index - 1].focus();
                }
            }
        }

        function handleOtpFocus(input, index) {
            const boxes = document.querySelectorAll('.otp-box');
            
            // Find the index of the first empty box
            let firstEmptyIndex = 0;
            for (let i = 0; i < boxes.length; i++) {
                if (boxes[i].value === "") {
                    firstEmptyIndex = i;
                    break;
                }
            }

            // Only force focus if the user clicks an EMPTY box that isn't the current expected one.
            // If they click a box THAT IS ALREADY FILLED, let them edit it for better UX.
            if (input.value === "" && index > firstEmptyIndex) {
                boxes[firstEmptyIndex].focus();
            }
        }

        async function registerUser() {
            clearErrors();
            try {
                const name = document.getElementById('reg-name').value.trim();
                const address = document.getElementById('reg-address').value.trim();
                const phone = document.getElementById('reg-phone').value;
                const email = document.getElementById('reg-email').value.trim();

                if (!name || !address || !phone || !email) return showError("signup-error", "Please fill all fields");
                if (phone.length !== 10) return showError("signup-error", "Please enter a valid 10-digit number");
                if (!email.includes('@')) return showError("signup-error", "Please enter a valid email address");

                const btn = document.querySelector('#signup-section .btn');
                const originalText = btn.innerText;
                btn.innerText = "Please wait...";
                btn.disabled = true;

                const res = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, address, phone, email })
                });
                const data = await res.json();

                btn.innerText = originalText;
                btn.disabled = false;

                if (res.ok) {
                    document.getElementById('login-phone').value = phone;
                    switchMode('login');
                    // Optional: Show specialized welcome message or just switch
                } else {
                    showError("signup-error", data.message || "User already exists");
                }
            } catch (err) {
                showError("signup-error", "Network Error: Check internet connection");
            }
        }

        async function requestOTP() {
            clearErrors();
            try {
                const phone = document.getElementById('login-phone').value;

                if (!phone) return showError("login-error", "Enter your mobile number");
                if (phone.length !== 10) return showError("login-error", "Please enter a valid 10-digit number");

                const btn = document.querySelector('#login-section .btn');
                const originalText = btn.innerText;
                btn.innerText = "Please wait...";
                btn.disabled = true;

                const res = await fetch(`${API_URL}/login/step1`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const data = await res.json();

                btn.innerText = originalText;
                btn.disabled = false;

                if (res.ok) {
                    activePhone = phone;
                    // --- NEW: PREMIUM NOTIFICATION BAR ---
                    document.getElementById('otp-alert-text').innerHTML = `OTP sent to <strong>${data.email}</strong>. Check your inbox.`;
                    document.getElementById('otp-alert-bar').style.display = 'block';

                    // Clear the smaller inline message
                    const inlineMsg = document.getElementById('otp-message');
                    if (inlineMsg) inlineMsg.innerText = "Check your inbox for your 4-digit code.";

                    switchMode('otp');
                } else {
                    showError("login-error", data.message || "User not found! Please sign up.");
                }
            } catch (err) {
                showError("login-error", "Connection Error: Check internet connection");
            }
        }

        async function verifyOTP() {
            clearErrors();
            try {
                // Aggregate OTP from the 4 digit boxes
                let otp = "";
                document.querySelectorAll('.otp-box').forEach(box => otp += box.value);

                const phone = activePhone || document.getElementById('login-phone').value;

                if (!otp || otp.length !== 4) return showError("otp-error", "Please enter the 4-digit code");

                const btn = document.querySelector('#otp-section .btn');
                const originalText = btn.innerText;
                btn.innerText = "Verifying...";
                btn.disabled = true;

                const res = await fetch(`${API_URL}/login/step2`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone.toString(), otp: otp.toString() })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('helpido_user', data.userId);
                    localStorage.setItem('helpido_phone', phone.toString());
                    localStorage.setItem('helpido_new_install', 'true');

                    btn.innerText = "Accepted!";
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 500);

                } else {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    showError("otp-error", data.message || "Invalid Code");
                }
            } catch (err) {
                showError("otp-error", "Network Error: Could not reach backend");
            }
        }

    </script>
</body>

</html>
